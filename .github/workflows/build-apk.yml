name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Crear estructura del proyecto Android
        run: |
          mkdir -p app/src/main/java/com/mandrake/calificaciones
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/assets

      - name: Descargar HTML de la app
        run: |
          curl -L "https://mandrake210.github.io/calificaciones/" \
            -o app/src/main/assets/index.html
          echo "HTML size: $(wc -c < app/src/main/assets/index.html)"

      - name: Crear AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.mandrake.calificaciones">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <application
                  android:allowBackup="true"
                  android:label="Calificaciones"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="sensorLandscape"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Crear MainActivity.java
        run: |
          cat > app/src/main/java/com/mandrake/calificaciones/MainActivity.java << 'EOF'
          package com.mandrake.calificaciones;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.*;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override public void onPermissionRequest(PermissionRequest r) { r.grant(r.getResources()); }
                  });
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override public void onBackPressed() { if (webView.canGoBack()) webView.goBack(); else super.onBackPressed(); }
          }
          EOF

      - name: Crear resources
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
                  <item name="android:statusBarColor">#1a1a2e</item>
              </style>
          </resources>
          EOF
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Calificaciones</string></resources>
          EOF

      - name: Crear build.gradle del módulo app
        run: |
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              compileSdk 34
              namespace 'com.mandrake.calificaciones'
              defaultConfig {
                  applicationId "com.mandrake.calificaciones"
                  minSdk 21
                  targetSdk 34
                  versionCode 15
                  versionName "10.15"
              }
              buildTypes {
                  debug { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}
          EOF

      - name: Crear build.gradle raíz
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

      - name: Crear settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "CalificacionesApp"
          include ':app'
          EOF

      - name: Construir APK
        run: |
          gradle assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Calificaciones-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Crear Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v10.15-${{ github.run_number }}
          name: "APK Calificaciones v10.15"
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
