name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Crear archivos del proyecto
        run: |
          mkdir -p $(dirname "app/src/main/java/com/mandrake/calificaciones/MainActivity.java")
          echo "" | base64 -d > "app/src/main/java/com/mandrake/calificaciones/MainActivity.java"
          mkdir -p $(dirname "app/src/main/AndroidManifest.xml")
          echo "" | base64 -d > "app/src/main/AndroidManifest.xml"
          mkdir -p $(dirname "app/src/main/res/values/styles.xml")
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHlsZSBuYW1lPSJBcHBUaGVtZSIgcGFyZW50PSJhbmRyb2lkOlRoZW1lLk1hdGVyaWFsLk5vQWN0aW9uQmFyIj4KICAgICAgICA8aXRlbSBuYW1lPSJhbmRyb2lkOnN0YXR1c0JhckNvbG9yIj4jMWExYTJlPC9pdGVtPgogICAgPC9zdHlsZT4KPC9yZXNvdXJjZXM+Cg==" | base64 -d > "app/src/main/res/values/styles.xml"
          mkdir -p $(dirname "app/src/main/res/values/strings.xml")
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz48c3RyaW5nIG5hbWU9ImFwcF9uYW1lIj5DYWxpZmljYWNpb25lczwvc3RyaW5nPjwvcmVzb3VyY2VzPgo=" | base64 -d > "app/src/main/res/values/strings.xml"
          echo "" | base64 -d > "app/build.gradle"
          echo "" | base64 -d > "build.gradle"
          echo "" | base64 -d > "settings.gradle"
          echo "b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bQphbmRyb2lkLnVzZUFuZHJvaWRYPXRydWUK" | base64 -d > "gradle.properties"

      - name: Descargar HTML de la app
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://mandrake210.github.io/calificaciones/" -o app/src/main/assets/index.html
          echo "HTML: $(wc -c < app/src/main/assets/index.html) bytes"

      - name: Construir APK
        run: gradle assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Calificaciones-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Crear Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v10.15-${{ github.run_number }}
          name: "APK Calificaciones v10.15"
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
