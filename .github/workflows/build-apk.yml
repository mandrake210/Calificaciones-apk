name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Crear proyecto Android con Python
        run: |
          python3 << 'PYEOF'
          import os

          def mkfile(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path, 'w').write(content)

          mkfile('app/src/main/java/com/mandrake/calificaciones/MainActivity.java', """
          package com.mandrake.calificaciones;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.*;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override public void onPermissionRequest(PermissionRequest r) { r.grant(r.getResources()); }
                  });
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override public void onBackPressed() { if (webView.canGoBack()) webView.goBack(); else super.onBackPressed(); }
          }
          """)

          mkfile('app/src/main/AndroidManifest.xml', """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.mandrake.calificaciones">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <application android:allowBackup="true" android:label="Calificaciones"
                  android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:screenOrientation="sensorLandscape"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>""")

          mkfile('app/src/main/res/values/styles.xml', """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
                  <item name="android:statusBarColor">#1a1a2e</item>
              </style>
          </resources>""")

          mkfile('app/src/main/res/values/strings.xml', """<?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Calificaciones</string></resources>""")

          mkfile('app/build.gradle', """
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              namespace 'com.mandrake.calificaciones'
              defaultConfig {
                  applicationId "com.mandrake.calificaciones"
                  minSdk 21
                  targetSdk 34
                  versionCode 15
                  versionName "10.15"
              }
              buildTypes {
                  debug { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}
          """)

          mkfile('build.gradle', """
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          """)

          mkfile('settings.gradle', """
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CalificacionesApp"
          include ':app'
          """)

          mkfile('gradle.properties', """
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroi
